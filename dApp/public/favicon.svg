<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark Obsidian Background -->
  <rect width="64" height="64" rx="16" fill="#0B0E17"/>
  <rect x="1" y="1" width="62" height="62" rx="15" stroke="url(#favicon_border)" stroke-width="2" stroke-opacity="0.5"/>
  
  <!-- Big Bold Geometric N -->
  <path d="M16 48V16L42 48H48V16" stroke="url(#favicon_n_grad)" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Glowing Cyan Accent Dot -->
  <circle cx="48" cy="16" r="4" fill="#38BDF8"/>

  <defs>
    <linearGradient id="favicon_border" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="50%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <linearGradient id="favicon_n_grad" x1="16" y1="16" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="60%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
  </defs>
</svg>